# Copy to: landfalls/<name>.yaml
landfall_version: 1
name: example-landfall
size: focused  # micro | focused | broad | strategic
purpose: >
  State the unique job this landfall performs. Keep it narrow enough that
  a different landfall could own a different arrival ritual in the same repo.

inference:
  why_this_landfall_probably_exists:
    - "What repeated user pain, repo structure, message pattern, or task drift suggests this landfall is needed?"
  alternatives_considered:
    - name: smaller-version
      size: micro
      tradeoff: "Faster and safer, but may miss adjacent responsibilities."
    - name: broader-version
      size: broad
      tradeoff: "More complete, but slower and more likely to blur ownership."
  recommended_shape: focused

when_to_run:
  - "At the start of work in this domain"
  - "After a relevant email/text/portal notification"
  - "Before sending a human-facing status update"

scope:
  grain: "one workstream"  # one notification | one person | one workstream | whole repo | whole ecosystem
  owns:
    - "The responsibility this landfall owns"
  does_not_own:
    - "Adjacent responsibility owned by another landfall"
  can_expand_to:
    - "Name a broader landfall this can roll up into"
  can_split_into:
    - "Name a smaller landfall if this becomes too broad"

sources:
  repo:
    paths:
      - "README.md"
      - "data/"
      - "wiki/"
  messages:
    enabled: false
    commands: []
    related_people: []
    search_terms: []
  email:
    enabled: false
    commands: []
    related_people: []
    search_terms: []
  finance:
    enabled: false
    commands: []
    amount_searches: []
  calendar:
    enabled: false
    commands: []
  portals:
    enabled: false
    urls: []
    human_only_fields:
      - "credentials"
      - "MFA or one-time codes"
      - "identity verification"
      - "bank or wire details"

questions:
  - id: right_size
    prompt: "Is this landfall still the right size, or should it be split/expanded?"
  - id: changed_facts
    prompt: "What materially changed since the last landfall?"
  - id: responsibilities
    prompt: "What is Daniel responsible for next?"
  - id: task_coverage
    prompt: "Is every responsibility represented in the repo task system?"
  - id: stale_state
    prompt: "Which repo tasks, payables, wiki pages, or drafts are stale?"

write_targets:
  evidence:
    - "wiki/<domain>/work/<topic>/evidence.md"
  tasks:
    - "data/tasks.json"
    - "wiki/<domain>/ops/tasks/"
  summaries:
    - "wiki/<domain>/work/<topic>/landfall-YYYY-MM-DD.md"

output:
  required_sections:
    - "Why this landfall shape"
    - "Options considered"
    - "New facts"
    - "Changed responsibilities"
    - "Task updates made"
    - "Human-only actions"
    - "Next 3-5 actions"

stop_conditions:
  - "A source asks for credentials, MFA, identity verification, bank details, wire instructions, or payment submission."
  - "The landfall would make a legal, tax, or financial decision without human approval."
  - "Evidence conflicts and the next action could cause money movement or irreversible submission."

done_when:
  - "Fresh evidence has been checked."
  - "Repo state has been updated or a no-change reason is recorded."
  - "Human-only actions are clearly separated from agent actions."
  - "Next actions are ordered."
